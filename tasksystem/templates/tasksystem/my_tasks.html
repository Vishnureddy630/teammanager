{% extends 'tasksystem/base.html' %}

{% block content %}

<h1>My Tasks</h1>

{% for task in tasks %}
<div class="task-box">
    <h3>{{ task.title }}</h3>
    <p>{{ task.description }}</p>
    <p>Status: {{ task.status }}</p>
    <p>Due Date: {{ task.due_date }}</p>

    <a href="/edit-task/{{ task.id }}/">Update Status</a>
</div>
{% endfor %}

{% endblock %}
